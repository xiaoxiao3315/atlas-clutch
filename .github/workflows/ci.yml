name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHONUTF8: "1"

jobs:
  windows-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Kept outside the quality gate on purpose: the public-repo secret and
      # path scan must stay independently enforced even if the gate's check
      # list is ever edited. The gate also runs it (single source of truth
      # for the full suite); this step is the defense-in-depth copy.
      - name: Safety scan (independent of quality gate)
        run: python -B scripts/ci_safety_check.py

      - name: Quality gate
        run: python -B scripts/quality_gate.py --ci
