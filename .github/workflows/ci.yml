name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHONUTF8: "1"

jobs:
  windows-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile bridge
        run: python -B -m py_compile bridge.py

      - name: Safety scan (tracked files only)
        run: python -B scripts/ci_safety_check.py

      - name: Smoke runtime
        run: python -B smoke_runtime.py

      - name: Smoke task loop
        run: python -B smoke_task_loop.py

      - name: Smoke tools status
        run: python -B smoke_tools_status.py

      - name: Smoke tool adapters
        run: python -B smoke_tool_adapters.py

      - name: File pack synthetic check
        run: python -B filepack_synthetic_check.py

      - name: Autocommit guard synthetic check
        run: python -B autocommit_guard_synthetic_check.py

      - name: Feature slice synthetic check
        run: python -B featureslice_synthetic_check.py

      - name: Git whitespace check
        run: git diff --check
